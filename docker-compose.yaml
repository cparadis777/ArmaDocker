services:
  arma3-server:
    build: .
    image: arma3-server:latest
    container_name: arma3-server
    ports:
      - "2302:2302/udp"
      - "2303:2303/udp"
      - "2304:2304/udp"
      - "2305:2305/udp"
      - "2306:2306/udp"
      - "2302:2302/tcp"
      - "2303:2303/tcp"
      - "2304:2304/tcp"
      - "2305:2305/tcp"
      - "2306:2306/tcp"
    env_file:
      - .env
    environment:
      - UPDATE_ON_START=${UPDATE_ON_START:-1}
    volumes:
      - ./arma:/arma:Z
      - ./arma/logs:/logs:Z
      - server_files:/server
      - credential_cache:/home/steam/.local/
    healthcheck:
      test: ["CMD", "pgrep", "-f", "arma3server_x64"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
volumes:
  credential_cache:
  server_files:
